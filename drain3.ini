[SNAPSHOT]
snapshot_interval_minutes = 10
compress_state = true

[MASKING]
# Normalize numbers and hex IDs so similar logs map to the same template
masking = [{"regex_pattern":"\\b\\d+\\b","mask_with":"NUM"},{"regex_pattern":"\\b[0-9a-f]{8,}\\b","mask_with":"HEX"}]

[DRAIN]
# sim_th: similarity threshold for grouping logs into templates (0-1)
sim_th = 0.4
depth = 4
max_children = 100
max_clusters = 100000
extra_delimiters = ["_", "-", "/", "."]
