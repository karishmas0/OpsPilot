name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install dev deps
        run: pip install -e ".[api,ui]" ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Mypy type check
        run: mypy src/opspilot --ignore-missing-imports

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    env:
      LLM_PROVIDER: mock
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install deps
        run: pip install -e ".[api,ui]" pytest pytest-asyncio httpx
      - name: Create minimal model artifacts for tests
        run: python tests/setup_dummy_test_data.py
      - name: Run tests
        run: pytest tests/ -v --tb=short

  dvc-check:
    name: DVC Pipeline Status
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install DVC
        run: pip install dvc
      - name: Check DVC lock is committed
        run: dvc status --no-run-cache
        continue-on-error: true

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: [test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /nuvodata/User_data/adarshk/work/OpsPilot
            git pull origin main
            pip install -e ".[api,ui]" -q
            pkill -f "uvicorn opspilot.api.main:app" || true
            sleep 2
            nohup uvicorn opspilot.api.main:app \
              --host 0.0.0.0 --port 8000 \
              >> /tmp/opspilot-api.log 2>&1 &
            echo "Deployed. API PID: $!"
